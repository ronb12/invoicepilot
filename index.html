<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoicePilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="copy">
          <p class="eyebrow">Billing operations cockpit</p>
          <h1>InvoicePilot</h1>
          <p>
            Track clients, invoices, and payment follow-ups without hauling in a full accounting suite.
          </p>
        </div>
        <aside class="invoice-card">
          <span>Collections flow</span>
          <strong>Clients -> invoices -> follow-ups</strong>
          <p>Built for small teams managing billing momentum.</p>
        </aside>
      </section>
      <section id="app" class="app-shell">
        <div class="settings-note">Loading InvoicePilot...</div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
